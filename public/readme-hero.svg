<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-label="GitPulse preview banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="55%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="50%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220" stop-opacity="0.94"/>
      <stop offset="100%" stop-color="#111827" stop-opacity="0.88"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.35"/>
      <stop offset="70%" stop-color="#34d399" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)"/>
  <circle cx="180" cy="110" r="170" fill="url(#glow)"/>
  <circle cx="1050" cy="120" r="200" fill="url(#glow)"/>
  <circle cx="1060" cy="610" r="210" fill="url(#glow)"/>

  <g opacity="0.16" stroke="#94a3b8" stroke-width="1">
    <path d="M0 140H1200"/>
    <path d="M0 260H1200"/>
    <path d="M0 380H1200"/>
    <path d="M0 500H1200"/>
    <path d="M0 620H1200"/>
    <path d="M160 0V720"/>
    <path d="M360 0V720"/>
    <path d="M560 0V720"/>
    <path d="M760 0V720"/>
    <path d="M960 0V720"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="84" y="86" width="1032" height="548" rx="34" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.08"/>
  </g>

  <g transform="translate(120 132)">
    <rect x="0" y="0" width="78" height="78" rx="22" fill="#020617" stroke="#34d399" stroke-opacity="0.35"/>
    <path d="M43 16c-9 10-4 18-8 23-4 5-9 5-9 13 0 9 7 16 16 16 10 0 18-8 18-18 0-10-7-14-17-34z" fill="url(#accent)"/>
    <text x="98" y="28" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20" font-weight="700" letter-spacing="0.22em">GITPULSE</text>
    <text x="98" y="66" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="46" font-weight="800">Track streaks with momentum</text>
    <text x="98" y="108" fill="#94a3b8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="20">Real-time contribution intelligence, profile context, and alerts in one dashboard.</text>
  </g>

  <g transform="translate(120 270)">
    <rect x="0" y="0" width="330" height="210" rx="26" fill="#0b1220" stroke="#ffffff" stroke-opacity="0.08"/>
    <text x="24" y="34" fill="#94a3b8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" letter-spacing="0.24em">STREAK SNAPSHOT</text>
    <text x="24" y="96" fill="#ffffff" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="64" font-weight="900">27</text>
    <text x="108" y="78" fill="#cbd5e1" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="700">day streak</text>
    <rect x="24" y="128" width="282" height="16" rx="8" fill="#1f2937"/>
    <rect x="24" y="128" width="210" height="16" rx="8" fill="url(#accent)"/>
    <text x="24" y="176" fill="#94a3b8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="15">Current progress toward the 30-day goal.</text>
  </g>

