      <text x="22" y="29" fill="#94a3b8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700" letter-spacing="0.2em">ALERTS</text>
      <text x="22" y="55" fill="#e2e8f0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700">Risk and milestone nudges</text>
    </g>
    <g transform="translate(246 0)">
      <rect x="0" y="0" width="222" height="76" rx="22" fill="#0b1220" stroke="#ffffff" stroke-opacity="0.08"/>
      <text x="22" y="29" fill="#94a3b8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700" letter-spacing="0.2em">PROFILE</text>
      <text x="22" y="55" fill="#e2e8f0" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="18" font-weight="700">Social and repo context</text>
    </g>
    <g transform="translate(492 0)">
      <rect x="0" y="0" width="248" height="76" rx="22" fill="#0b1220" stroke="#ffffff" stroke-opacity="0.08"/>
      <text x="22" y="29" fill="#94a3b8" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700" letter-spacing="0.2em">PWA</text>
