      <rect x="378" y="54" width="44" height="44" rx="10" fill="#065f46"/>
      <rect x="432" y="54" width="44" height="44" rx="10" fill="#0f172a"/>
      <rect x="486" y="54" width="44" height="44" rx="10" fill="#134e4a"/>
      <rect x="0" y="108" width="44" height="44" rx="10" fill="#0f172a"/>
      <rect x="54" y="108" width="44" height="44" rx="10" fill="#134e4a"/>
      <rect x="108" y="108" width="44" height="44" rx="10" fill="#0f172a"/>
      <rect x="162" y="108" width="44" height="44" rx="10" fill="#065f46"/>
      <rect x="216" y="108" width="44" height="44" rx="10" fill="#14532d"/>
      <rect x="270" y="108" width="44" height="44" rx="10" fill="#0f172a"/>
