      <rect x="432" y="0" width="44" height="44" rx="10" fill="#14532d"/>
      <rect x="486" y="0" width="44" height="44" rx="10" fill="#0f172a"/>
      <rect x="0" y="54" width="44" height="44" rx="10" fill="#14532d"/>
      <rect x="54" y="54" width="44" height="44" rx="10" fill="#065f46"/>
      <rect x="108" y="54" width="44" height="44" rx="10" fill="#0f172a"/>
